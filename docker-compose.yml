version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: asha_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: asha_assist
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - asha_network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: asha_ai_service
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - asha_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: asha_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://admin:password123@mongodb:27017/asha_assist?authSource=admin
      - AI_SERVICE_URL=http://ai-service:8000
    depends_on:
      mongodb:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    networks:
      - asha_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api
    container_name: asha_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - asha_network

networks:
  asha_network:
    driver: bridge

volumes:
  mongodb_data:
